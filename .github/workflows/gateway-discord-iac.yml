name: Gateway Discord Infrastructure

# Environment-specific variables (set in GitHub Settings > Environments):
#
# gateway-dev environment:
#   Variables:
#     - TERRAFORM_AWS_ROLE_ARN: IAM role for Terraform (development account)
#     - AWS_REGION: us-east-1
#   Secrets:
#     - GHCR_USERNAME: GitHub Container Registry username
#     - GHCR_TOKEN: GitHub Container Registry token
#     - ELIZA_CLOUD_URL: Development Eliza Cloud API URL
#     - GATEWAY_BOOTSTRAP_SECRET: Development bootstrap secret
#     - REDIS_URL: Development Redis URL
#     - REDIS_TOKEN: Development Redis token
#     - BLOB_TOKEN: Development blob storage token
#
# gateway-prd environment:
#   Variables:
#     - TERRAFORM_AWS_ROLE_ARN: IAM role for Terraform (production account)
#     - AWS_REGION: us-east-1
#   Secrets:
#     - GHCR_USERNAME: GitHub Container Registry username
#     - GHCR_TOKEN: GitHub Container Registry token
#     - ELIZA_CLOUD_URL: Production Eliza Cloud API URL
#     - GATEWAY_BOOTSTRAP_SECRET: Production bootstrap secret
#     - REDIS_URL: Production Redis URL
#     - REDIS_TOKEN: Production Redis token
#     - BLOB_TOKEN: Production blob storage token

on:
  push:
    branches: [main, dev]
    paths:
      - "services/gateway-discord/terraform/**"
      - ".github/workflows/gateway-discord-iac.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/gateway-discord/terraform/**"
      - ".github/workflows/gateway-discord-iac.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - gateway-dev
          - gateway-prd
        default: gateway-dev

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: services/gateway-discord/terraform

jobs:
  # Development environment job
  terraform-dev:
    name: Terraform gateway-dev
    runs-on: ubuntu-latest
    # Only run for: push to dev, PR targeting dev, or manual dispatch selecting gateway-dev
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && github.base_ref == 'dev') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'gateway-dev')
    environment: gateway-dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend-development.hcl

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var-file=development.tfvars \
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="eliza_cloud_url=${{ secrets.ELIZA_CLOUD_URL }}" \
            -var="gateway_bootstrap_secret=${{ secrets.GATEWAY_BOOTSTRAP_SECRET }}" \
            -var="redis_url=${{ secrets.REDIS_URL }}" \
            -var="redis_token=${{ secrets.REDIS_TOKEN }}" \
            -var="blob_token=${{ secrets.BLOB_TOKEN }}" \
            -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_PLAN_LENGTH = 60000;
            let planOutput = `${{ steps.plan.outputs.stdout }}`;
            let truncated = false;
            if (planOutput.length > MAX_PLAN_LENGTH) {
              planOutput = planOutput.substring(0, MAX_PLAN_LENGTH);
              truncated = true;
            }
            
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            > **Note**: Sensitive values (tokens, secrets) are marked as \`sensitive\` in Terraform
            > and should appear as \`(sensitive value)\` in the plan output below.
            
            <details><summary>Show Plan (gateway-dev)${truncated ? ' - TRUNCATED' : ''}</summary>
            
            \`\`\`terraform
            ${planOutput}
            \`\`\`
            ${truncated ? '\n⚠️ *Plan output was truncated due to size. View full output in the Actions log.*\n' : ''}
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var-file=development.tfvars \
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="eliza_cloud_url=${{ secrets.ELIZA_CLOUD_URL }}" \
            -var="gateway_bootstrap_secret=${{ secrets.GATEWAY_BOOTSTRAP_SECRET }}" \
            -var="redis_url=${{ secrets.REDIS_URL }}" \
            -var="redis_token=${{ secrets.REDIS_TOKEN }}" \
            -var="blob_token=${{ secrets.BLOB_TOKEN }}"

  # Production environment job
  terraform-prd:
    name: Terraform gateway-prd
    runs-on: ubuntu-latest
    # Only run for: push to main, PR targeting main, or manual dispatch selecting gateway-prd
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'gateway-prd')
    environment: gateway-prd
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend-production.hcl

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var-file=production.tfvars \
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="eliza_cloud_url=${{ secrets.ELIZA_CLOUD_URL }}" \
            -var="gateway_bootstrap_secret=${{ secrets.GATEWAY_BOOTSTRAP_SECRET }}" \
            -var="redis_url=${{ secrets.REDIS_URL }}" \
            -var="redis_token=${{ secrets.REDIS_TOKEN }}" \
            -var="blob_token=${{ secrets.BLOB_TOKEN }}" \
            -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_PLAN_LENGTH = 60000;
            let planOutput = `${{ steps.plan.outputs.stdout }}`;
            let truncated = false;
            if (planOutput.length > MAX_PLAN_LENGTH) {
              planOutput = planOutput.substring(0, MAX_PLAN_LENGTH);
              truncated = true;
            }
            
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            > **Note**: Sensitive values (tokens, secrets) are marked as \`sensitive\` in Terraform
            > and should appear as \`(sensitive value)\` in the plan output below.
            
            <details><summary>Show Plan (gateway-prd)${truncated ? ' - TRUNCATED' : ''}</summary>
            
            \`\`\`terraform
            ${planOutput}
            \`\`\`
            ${truncated ? '\n⚠️ *Plan output was truncated due to size. View full output in the Actions log.*\n' : ''}
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var-file=production.tfvars \
            -var="ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="eliza_cloud_url=${{ secrets.ELIZA_CLOUD_URL }}" \
            -var="gateway_bootstrap_secret=${{ secrets.GATEWAY_BOOTSTRAP_SECRET }}" \
            -var="redis_url=${{ secrets.REDIS_URL }}" \
            -var="redis_token=${{ secrets.REDIS_TOKEN }}" \
            -var="blob_token=${{ secrets.BLOB_TOKEN }}"
