name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  BUN_VERSION: "1.2"
  SKIP_ENV_VALIDATION: "1"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
        env:
          NODE_ENV: test

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:security
        env:
          NODE_ENV: test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:integration
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('bun.lockb') }}-${{ hashFiles('app/**', 'components/**', 'lib/**') }}
          restore-keys: nextjs-${{ hashFiles('bun.lockb') }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ .next directory exists"
            ls -la .next | head -10
          else
            echo "❌ .next directory not found"
            ls -la
            exit 1
          fi
      - name: Clean invalid artifact characters
        run: |
          echo "Checking for files with invalid characters (colons)..."
          INVALID_FILES=$(find .next -name '*:*' 2>/dev/null || true)
          if [ -n "$INVALID_FILES" ]; then
            echo "⚠️ Found files with invalid characters:"
            echo "$INVALID_FILES"
            echo "Removing these files..."
            find .next -name '*:*' -delete 2>/dev/null || true
            echo "✅ Cleaned files with invalid characters"
          else
            echo "✅ No invalid characters found"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  e2e-ui:
    name: E2E UI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:ui
        env:
          CI: "true"
          NODE_ENV: production
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-ui-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-api:
    name: E2E API
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:api
        env:
          CI: "true"
          NODE_ENV: production
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-api-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-pages:
    name: E2E Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:pages
        env:
          CI: "true"
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-pages-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-miniapp:
    name: E2E Miniapp
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - name: Install and build miniapp
        run: |
          cd miniapp
          bun install --frozen-lockfile
          bun run build
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - name: Start servers and run tests
        run: |
          # Initialize PIDs
          MAIN_PID=""
          MINIAPP_PID=""

          # Cleanup function for trap handler
          cleanup() {
            echo "Cleaning up server processes..."
            if [ -n "$MAIN_PID" ] && kill -0 $MAIN_PID 2>/dev/null; then
              kill $MAIN_PID 2>/dev/null || true
            fi
            if [ -n "$MINIAPP_PID" ] && kill -0 $MINIAPP_PID 2>/dev/null; then
              kill $MINIAPP_PID 2>/dev/null || true
            fi
          }

          # Set trap for cleanup on EXIT, INT, TERM
          trap cleanup EXIT INT TERM

          # Start main app on port 3000
          bun run start &
          MAIN_PID=$!

          # Start miniapp on port 3001 (use subshell to preserve working directory)
          (cd miniapp && bun run start -p 3001) &
          MINIAPP_PID=$!

          # Wait for servers to be ready (using -sf to fail on HTTP errors)
          echo "Waiting for servers to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Main app is ready"
              break
            fi
            sleep 2
          done

          for i in {1..30}; do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Miniapp is ready"
              break
            fi
            sleep 2
          done

          # Verify servers actually started and returning successful responses
          if ! curl -sf http://localhost:3000 > /dev/null 2>&1; then
            echo "❌ Main app failed to start or returning errors"
            exit 1
          fi
          if ! curl -sf http://localhost:3001 > /dev/null 2>&1; then
            echo "❌ Miniapp failed to start or returning errors"
            exit 1
          fi
          echo "✅ Both servers are running"

          # Run tests from root directory (default to failure, set success only on pass)
          TEST_EXIT=1
          bun run test:playwright:miniapp && TEST_EXIT=0 || true

          exit ${TEST_EXIT}
        env:
          CI: "true"
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-miniapp-results
          path: tests/playwright/test-results/
          retention-days: 7

  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        unit-tests,
        security-tests,
        integration-tests,
        build,
        e2e-ui,
        e2e-api,
        e2e-pages,
        e2e-miniapp,
      ]
    if: always()
    steps:
      - run: |
          results="${{ needs.lint.result }},${{ needs.unit-tests.result }},${{ needs.security-tests.result }},${{ needs.integration-tests.result }},${{ needs.build.result }},${{ needs.e2e-ui.result }},${{ needs.e2e-api.result }},${{ needs.e2e-pages.result }},${{ needs.e2e-miniapp.result }}"
          if echo "$results" | grep -qvE '^(success,)*success$'; then
            echo "❌ CI failed: $results"
            exit 1
          fi
          echo "✅ CI passed"
