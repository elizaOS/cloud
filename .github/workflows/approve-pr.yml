name: Approve PR
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve'
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Approve PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review ${{ inputs.pr_number }} --approve --body "Approved via automated workflow dispatch."
