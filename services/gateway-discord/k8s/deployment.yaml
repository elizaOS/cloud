apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-discord
  namespace: gateway-discord
  labels:
    app: gateway-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-discord
  template:
    metadata:
      labels:
        app: gateway-discord
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: gateway
          image: ghcr.io/elizaOS/eliza-cloud-v2/gateway-discord:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: ELIZA_CLOUD_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-discord-secrets
                  key: eliza-cloud-url
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-discord-secrets
                  key: internal-api-key
            - name: KV_REST_API_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-discord-secrets
                  key: redis-url
            - name: KV_REST_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-discord-secrets
                  key: redis-token
            - name: BLOB_READ_WRITE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-discord-secrets
                  key: blob-token
                  optional: true
            - name: MAX_BOTS_PER_POD
              value: "100"
            # Failover timing: max latency = DEAD_POD_THRESHOLD + FAILOVER_CHECK_INTERVAL
            # With these defaults: 45s + 30s = 75s max failover time
            - name: FAILOVER_CHECK_INTERVAL_MS
              value: "30000"
            - name: DEAD_POD_THRESHOLD_MS
              value: "45000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Allow time for graceful shutdown (save state, close connections)
                # Should be less than terminationGracePeriodSeconds (60s)
                command: ["/bin/sh", "-c", "sleep 45"]
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-discord
  namespace: gateway-discord
  labels:
    app: gateway-discord
spec:
  selector:
    app: gateway-discord
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
