name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2"
  SKIP_ENV_VALIDATION: "1"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
        env:
          NODE_ENV: test

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:security
        env:
          NODE_ENV: test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:integration
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('bun.lockb') }}-${{ hashFiles('app/**', 'components/**', 'lib/**') }}
          restore-keys: nextjs-${{ hashFiles('bun.lockb') }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ .next directory exists"
            ls -la .next | head -10
          else
            echo "❌ .next directory not found"
            ls -la
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1
          if-no-files-found: warn

  e2e-ui:
    name: E2E UI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:ui
        env:
          CI: "true"
          NODE_ENV: production
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-ui-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-api:
    name: E2E API
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:api
        env:
          CI: "true"
          NODE_ENV: production
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-api-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-pages:
    name: E2E Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:pages
        env:
          CI: "true"
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-pages-results
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-miniapp:
    name: E2E Miniapp
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lockb') }}
          restore-keys: playwright-
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:playwright:miniapp
        env:
          CI: "true"
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-miniapp-results
          path: tests/playwright/test-results/
          retention-days: 7

  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        unit-tests,
        security-tests,
        integration-tests,
        build,
        e2e-ui,
        e2e-api,
        e2e-pages,
        e2e-miniapp,
      ]
    if: always()
    steps:
      - run: |
          results="${{ needs.lint.result }},${{ needs.unit-tests.result }},${{ needs.security-tests.result }},${{ needs.integration-tests.result }},${{ needs.build.result }},${{ needs.e2e-ui.result }},${{ needs.e2e-api.result }},${{ needs.e2e-pages.result }},${{ needs.e2e-miniapp.result }}"
          if echo "$results" | grep -qvE '^(success,)*success$'; then
            echo "❌ CI failed: $results"
            exit 1
          fi
          echo "✅ CI passed"
