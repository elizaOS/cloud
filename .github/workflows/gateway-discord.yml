name: Gateway Discord Service

on:
  push:
    branches: [main, dev, feat/discord-gateway]
    paths:
      - "services/gateway-discord/**"
      - "lib/services/gateway-discord/**"
      - "app/api/v1/discord/**"
      - "app/api/internal/discord/**"
      - "tests/unit/discord-connections*"
      - ".github/workflows/gateway-discord.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/gateway-discord/**"
      - "lib/services/gateway-discord/**"
      - "app/api/v1/discord/**"
      - "app/api/internal/discord/**"
      - "tests/unit/discord-connections*"
      - ".github/workflows/gateway-discord.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  BUN_VERSION: "1.2"
  IMAGE_NAME: gateway-discord
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/elizaos/eliza-cloud-v2/gateway-discord

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Install service dependencies
        run: cd services/gateway-discord && bun install --frozen-lockfile
      - name: Run service tests
        run: bun test services/gateway-discord/tests/ --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"
      - name: Run lib tests
        run: bun test lib/services/gateway-discord/__tests__/ --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"
      - name: Run Discord API unit tests
        run: bun test tests/unit/discord-connections-api.test.ts --timeout 60000
        env:
          SKIP_SERVER_CHECK: "true"

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/gateway-discord
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Image tags: ${{ steps.meta.outputs.tags }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    #if: (github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GATEWAY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.GATEWAY_AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --name ${{ vars.GATEWAY_CLUSTER_NAME }} --region ${{ vars.GATEWAY_AWS_REGION }}

      - name: Deploy to staging with Kustomize
        run: |
          cd services/gateway-discord/k8s
          echo "Setting image to: ${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}"
          kustomize edit set image ${{ env.IMAGE_REPO }}=${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}
          echo "Applying kustomize manifests..."
          kubectl apply -k .
          kubectl rollout status deployment/gateway-discord -n gateway-discord --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n gateway-discord -l app=gateway-discord
          kubectl describe deployment gateway-discord -n gateway-discord | grep Image

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GATEWAY_AWS_ROLE_ARN }}
          aws-region: ${{ vars.GATEWAY_AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --name ${{ vars.GATEWAY_CLUSTER_NAME }} --region ${{ vars.GATEWAY_AWS_REGION }}

      - name: Deploy to production with Kustomize
        run: |
          cd services/gateway-discord/k8s
          echo "Setting image to: ${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}"
          kustomize edit set image ${{ env.IMAGE_REPO }}=${{ env.IMAGE_REPO }}@${{ needs.build.outputs.digest }}
          echo "Applying kustomize manifests..."
          kubectl apply -k .
          kubectl rollout status deployment/gateway-discord -n gateway-discord --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n gateway-discord -l app=gateway-discord
          kubectl describe deployment gateway-discord -n gateway-discord | grep Image
