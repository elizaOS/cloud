apiVersion: eliza.ai/v1alpha1
kind: Server
metadata:
  name: shared-eliza
  namespace: eliza-agents
spec:
  capacity: 50
  tier: shared
  project: cloud
  image: localhost:5001/agent-server:dev
  maxReplicas: 10
  cooldownPeriod: 60
  pollingInterval: 10
  secretRef: eliza-agent-secrets
  agents:
    - agentId: "eliza"
      characterRef: "eliza"
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
