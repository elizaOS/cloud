name: Gateway Webhook

on:
  push:
    branches: [main, dev]
    paths:
      - "packages/services/gateway-webhook/**"
      - ".github/workflows/gateway-webhook.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "packages/services/gateway-webhook/**"
      - ".github/workflows/gateway-webhook.yml"

concurrency:
  group: gateway-webhook-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.5"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install service dependencies
        run: cd packages/services/gateway-webhook && bun install --frozen-lockfile

      - name: Run unit tests (isolated — mock.module is process-global in bun)
        working-directory: packages/services/gateway-webhook
        run: |
          bun test __tests__/project-config.test.ts --timeout 60000
          bun test __tests__/webhook-config.test.ts __tests__/webhook-handler.test.ts __tests__/adapters/ --timeout 60000
