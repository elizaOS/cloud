# E2E Test Config (auto-starts server)
#
# Used for: e2e/api, e2e/runtime tests
# Prerequisites: docker-compose up -d
#
# What it does:
#   - Loads preload.ts which starts Next.js server and waits for health
#   - Server auto-shuts down after tests
#
# ⚠️ KNOWN BUN BUG: --config doesn't load preload properly (oven-sh/bun#17664)
# Use --preload flag directly instead:
#
# Usage:
#   bun test --preload ./tests/e2e/preload.ts tests/e2e/api
#   bun test --preload ./tests/e2e/preload.ts tests/e2e/runtime

[test]
preload = ["./tests/e2e/preload.ts"]
timeout = 120000
