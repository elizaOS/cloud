apiVersion: eliza.ai/v1alpha1
kind: Server
metadata:
  name: shared-eliza
  namespace: eliza-agents
spec:
  capacity: 50
  tier: shared
  project: cloud
  image: localhost:5001/agent-server:dev
  maxReplicas: 10
  secretRef: eliza-agent-secrets
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
