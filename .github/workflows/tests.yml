name: Tests

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

env:
  DATABASE_URL: postgresql://eliza_dev:local_dev_password@localhost:5432/eliza_dev
  REDIS_URL: redis://localhost:6379
  NODE_ENV: test
  CACHE_ENABLED: 'false'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: 'true'
      - run: bun test tests/integration --timeout 60000

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - run: bun test tests/unit --timeout 30000

  property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: 'true'
      - run: bun test tests/properties --timeout 300000

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - run: bun run lint
      # Disabled: too many TS errors from rapid development, will fix post-merge
      # - name: Check TypeScript types
      #   run: bun run check-types
      #   env:
      #     NODE_OPTIONS: --max-old-space-size=8192

  e2e-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [integration-tests, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: 'true'
      - name: Run E2E API tests (auto-starts server)
        # Note: --config has a Bun bug with preloads (see oven-sh/bun#17664)
        run: bun test --preload ./tests/e2e/preload.ts tests/e2e/api tests/e2e/runtime --timeout 120000
        env:
          TEST_BASE_URL: http://localhost:3000
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  e2e-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-tests, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: 'true'
          install-playwright: 'true'
      - name: Start server for Playwright
        run: bun run dev &
      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:3000/api/health > /dev/null; do sleep 1; done'
          echo "Server ready"
      - run: bunx playwright test tests/e2e/browser
        env:
          BASE_URL: http://localhost:3000
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
