name: Tests

# Cancel previous runs for the same PR/branch
concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  service-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: eliza_dev
          POSTGRES_PASSWORD: local_dev_password
          POSTGRES_DB: eliza_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eliza_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup test database
        env:
          PGPASSWORD: local_dev_password
        run: |
          psql -h localhost -U eliza_dev -d eliza_dev -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://eliza_dev:local_dev_password@localhost:5432/eliza_dev
        run: bun run db:push

      - name: Run service tests
        env:
          DATABASE_URL: postgresql://eliza_dev:local_dev_password@localhost:5432/eliza_dev
          NODE_ENV: test
        run: bun test tests/services --timeout 60000

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check-types
