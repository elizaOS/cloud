# HorizontalPodAutoscaler for Gateway Discord
#
# Scaling strategy:
# - Primary: CPU/Memory utilization (works out of the box)
# - Secondary: Custom bot count metric (requires prometheus-adapter)
#
# To enable custom metric scaling, deploy prometheus-adapter with config:
#   rules:
#     - seriesQuery: 'gateway_discord_bots_total{pod!=""}'
#       resources:
#         overrides:
#           pod: {resource: "pod"}
#           namespace: {resource: "namespace"}
#       name:
#         matches: "^(.*)$"
#         as: "gateway_discord_bots_total"
#       metricsQuery: 'sum(<<.Series>>{<<.LabelMatchers>>}) by (pod)'
#
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-discord
  namespace: gateway-discord
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-discord
  minReplicas: 3
  maxReplicas: 100
  metrics:
    # Primary metrics - work without additional setup
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metric - requires prometheus-adapter (see comments above)
    # Scale when average bots per pod exceeds 50
    - type: Pods
      pods:
        metric:
          name: gateway_discord_bots_total
        target:
          type: AverageValue
          averageValue: "50"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
