apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-discord
  namespace: eliza-infra
  labels:
    app: gateway-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-discord
  template:
    metadata:
      labels:
        app: gateway-discord
    spec:
      containers:
        - name: gateway-discord
          image: localhost:5001/gateway-discord:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: gateway-discord-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ELIZA_CLOUD_URL
              value: "http://eliza-cloud.eliza-infra.svc:3000"
            - name: KV_REST_API_URL
              value: "http://redis-rest.eliza-infra.svc:8079"
            - name: KV_REST_API_TOKEN
              value: "local_dev_token"
            - name: VOICE_MESSAGE_ENABLED
              value: "false"
            - name: LOG_LEVEL
              value: "debug"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "curl -s -X POST http://localhost:3000/drain"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-discord
  namespace: eliza-infra
spec:
  selector:
    app: gateway-discord
  ports:
    - port: 3000
      targetPort: 3000
      name: http
