version: "3.8"

services:
  discord-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - POD_NAME=local-gateway
      - ELIZA_CLOUD_URL=http://host.docker.internal:3000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - KV_REST_API_URL=${KV_REST_API_URL}
      - KV_REST_API_TOKEN=${KV_REST_API_TOKEN}
      - MAX_BOTS_PER_POD=10
      - FAILOVER_CHECK_INTERVAL_MS=30000
      - DEAD_POD_THRESHOLD_MS=60000
      - LOG_LEVEL=debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
