name: Deploy Backend

on:
  push:
    branches: [dev, main]
    paths:
      - 'packages/lib/**'
      - 'packages/db/**'
      - 'packages/scripts/**'
      - 'packages/services/**'
      - 'app/api/**'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.9"

jobs:
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      branch: ${{ steps.env.outputs.branch }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.inputs.environment == 'production' && 'main' || 'dev' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi

  migrate-db:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    timeout-minutes: 10
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if [ "$attempt" -eq 3 ]; then
              bun install --frozen-lockfile --verbose && exit 0
            else
              bun install --frozen-lockfile && exit 0
            fi

            echo "bun install attempt $attempt failed; retrying in 10s..."
            sleep 10
          done

          exit 1

      - name: Skip migrations when database secret is unavailable
        if: ${{ env.NEON_DATABASE_URL == '' }}
        run: |
          echo "NEON_DATABASE_URL is not configured for the ${{ needs.determine-env.outputs.environment }} environment; skipping database migrations." >> $GITHUB_STEP_SUMMARY

      - name: Run migrations
        if: ${{ env.NEON_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.NEON_DATABASE_URL }}
        run: bun run db:migrate

      - name: Notify Discord (Success)
        if: success() && env.NEON_DATABASE_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "🗄️ Database Migrated"
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0x00ff00

      - name: Notify Discord (Failure)
        if: failure() && env.NEON_DATABASE_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "❌ Database Migration Failed"
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0xff0000

  deploy:
    name: Deploy to milady VPS
    runs-on: ubuntu-latest
    needs: [determine-env, migrate-db]
    environment: ${{ needs.determine-env.outputs.environment }}
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.MILADY_VPS_HOST }}
          username: deploy
          key: ${{ secrets.MILADY_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== Deploying eliza-cloud backend ==="
            
            sudo chown -R deploy:deploy /opt/eliza-cloud
            cd /opt/eliza-cloud
            git config --global --add safe.directory /opt/eliza-cloud

            if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              STASH_NAME="deploy-backend-auto-$(date -u +%Y%m%dT%H%M%SZ)"
              git stash push --include-untracked --message "$STASH_NAME"
              echo "Stashed local changes as $STASH_NAME"
            fi
            
            # Fetch and checkout
            git fetch origin
            git checkout ${{ needs.determine-env.outputs.branch }}
            git pull origin ${{ needs.determine-env.outputs.branch }}
            
            # Install and build
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi
            export NEXT_DIST_DIR=.next-build
            for attempt in 1 2 3; do
              if bun install --frozen-lockfile; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi

              echo "bun install attempt $attempt failed; retrying in 10s..."
              sleep 10
            done
            bun run build
            
            # Restart the Next.js service
            sudo systemctl restart eliza-cloud
            
            echo "=== Deploy complete ==="

      - name: Health Check
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.MILADY_VPS_HOST }}
          username: deploy
          key: ${{ secrets.MILADY_VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "Checking eliza-cloud health..."
            for attempt in $(seq 1 18); do
              for url in http://localhost:3000/api/health http://localhost:3334/api/health; do
                if curl -sf "$url" > /dev/null; then
                  echo "Health check passed on attempt $attempt via $url."
                  exit 0
                fi
              done

              echo "Health check attempt $attempt/18 failed; retrying in 5s..."
              sleep 5
            done

            echo "eliza-cloud failed health checks after 90s. Collecting diagnostics..."
            sudo ss -ltnp | grep -E ':(3000|3334)\\s' || true
            sudo systemctl status eliza-cloud --no-pager || true
            sudo journalctl -u eliza-cloud -n 100 --no-pager || true
            exit 1

      - name: Notify Discord
        if: success()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "🚀 Backend Deployed"
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0x00ff00

      - name: Notify Discord (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          ack_no_webhook: true
          title: "❌ Backend Deploy Failed"
          description: |
            Environment: ${{ needs.determine-env.outputs.environment }}
            Branch: ${{ needs.determine-env.outputs.branch }}
            Commit: ${{ github.sha }}
          color: 0xff0000
