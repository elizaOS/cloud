name: Tests

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://eliza_dev:local_dev_password@localhost:5432/eliza_dev
  TEST_DATABASE_URL: postgresql://eliza_dev:local_dev_password@localhost:5432/eliza_dev
  REDIS_URL: redis://localhost:6379
  NODE_ENV: test
  CACHE_ENABLED: "false"
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - name: Run lint
        run: bun run lint
      - name: Run typecheck
        run: bun run check-types

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          bulk_tests=()
          while IFS= read -r test_file; do
            bulk_tests+=("$test_file")
          done < <(
            find tests/unit -name '*.test.ts' \
              ! -path 'tests/unit/credits.test.ts' \
              ! -path 'tests/unit/eliza-app/telegram-ux-helpers.test.ts' \
              ! -path 'tests/unit/eliza-app/discord-auth.test.ts' \
              ! -path 'tests/unit/mcp-google-tools.test.ts' \
              ! -path 'tests/unit/mcp-proxy-affiliate-pricing.test.ts' \
              ! -path 'tests/unit/wallet-auth.test.ts' \
              | sort
          )

          SKIP_DB_DEPENDENT=1 SKIP_SERVER_CHECK=true bun test \
            --preload ./tests/load-env.ts \
            tests/unit/mcp-google-tools.test.ts

          SKIP_DB_DEPENDENT=1 SKIP_SERVER_CHECK=true bun test \
            --max-concurrency=1 \
            --preload ./tests/load-env.ts \
            "${bulk_tests[@]}" \
            lib/services/gateway-discord/__tests__ \
            services/gateway-discord/tests/gateway-manager.test.ts \
            services/gateway-discord/tests/leader-election.test.ts \
            services/gateway-discord/tests/logger.test.ts \
            services/gateway-discord/tests/voice-message-handler.test.ts

          SKIP_DB_DEPENDENT=1 SKIP_SERVER_CHECK=true bun test \
            --preload ./tests/load-env.ts \
            tests/unit/mcp-proxy-affiliate-pricing.test.ts

          SKIP_DB_DEPENDENT=1 SKIP_SERVER_CHECK=true bun test \
            --preload ./tests/load-env.ts \
            tests/unit/wallet-auth.test.ts \
            tests/unit/credits.test.ts \
            tests/unit/eliza-app/telegram-ux-helpers.test.ts \
            tests/unit/eliza-app/discord-auth.test.ts

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: "true"
      - name: Run integration tests
        run: bun run test:integration

  property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: "true"
      - name: Run property tests
        run: bun run test:properties

  runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: "true"
      - name: Run runtime tests
        run: bun run test:runtime

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
      - name: Run build
        run: bun run build

  e2e-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-types, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          setup-db: "true"
      - name: Run API e2e tests
        run: bun run test:e2e:api
